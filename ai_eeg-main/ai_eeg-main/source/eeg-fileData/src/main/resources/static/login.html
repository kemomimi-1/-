<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG AI Assistant - 登录</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            padding: 48px 40px;
            margin: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .form-tabs {
            display: flex;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .tab-button {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #666;
        }

        .tab-button.active {
            background: white;
            color: #1a1a1a;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .form-container {
            position: relative;
            min-height: 200px;
        }

        .form {
            transition: all 0.3s ease;
        }

        .form.hidden {
            opacity: 0;
            transform: translateX(10px);
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 15px;
            background: white;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .form-group .hint {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
        }

        .submit-button {
            width: 100%;
            padding: 12px 20px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-button:hover:not(:disabled) {
            background: #333;
            transform: translateY(-1px);
        }

        .submit-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid;
        }

        .alert.success {
            background: #f0fdf4;
            color: #15803d;
            border-color: #bbf7d0;
        }

        .alert.error {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                margin: 16px;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="header">
        <div class="logo">🧠</div>
        <h1>EEG AI Assistant</h1>
        <p>专业的脑电数据分析平台</p>
    </div>

    <div class="form-tabs">
        <button class="tab-button active" onclick="switchTab('login', this)">登录</button>
        <button class="tab-button" onclick="switchTab('register', this)">注册</button>
    </div>

    <div id="alert-container"></div>

    <div class="form-container">
        <!-- 登录表单 -->
        <form id="login-form" class="form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-username">用户名</label>
                <input type="text" id="login-username" required
                       placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" required
                       placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit" class="submit-button" id="login-btn">
                登录
            </button>
        </form>

        <!-- 注册表单 -->
        <form id="register-form" class="form hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" required
                       placeholder="6-20位字母数字组合"
                       pattern="^[a-zA-Z0-9]{6,20}$"
                       autocomplete="username">
                <div class="hint">用户名必须是6-20位字母和数字组合</div>
            </div>
            <div class="form-group">
                <label for="register-password">密码</label>
                <input type="password" id="register-password" required
                       placeholder="8-30位，包含字母和数字"
                       pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*?&]{8,30}$"
                       autocomplete="new-password">
                <div class="hint">密码必须8-30位，包含至少一个字母和一个数字</div>
            </div>
            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" required
                       placeholder="请再次输入密码" autocomplete="new-password">
            </div>
            <button type="submit" class="submit-button" id="register-btn">
                注册
            </button>
        </form>
    </div>

    <div class="footer">
        © 2025 EEG AI Assistant. 安全保护您的脑电数据.
    </div>
</div>

<script>
    // 页面加载时检查登录状态
    document.addEventListener('DOMContentLoaded', function() {
        checkAuthStatus();
    });

    // 检查用户登录状态
    async function checkAuthStatus() {
        try {
            const response = await fetch('/api/auth/status');
            const data = await response.json();

            if (data.authenticated) {
                showSuccess(`欢迎回来，${data.username}！正在跳转...`);
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            }
        } catch (error) {
            console.log('检查登录状态失败:', error);
        }
    }

    // 切换表单
    function switchTab(formType, element) {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const tabButtons = document.querySelectorAll('.tab-button');

        // 更新tab按钮状态
        tabButtons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        // 切换表单显示
        if (formType === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
        }

        clearAlerts();
    }

    // 处理登录
    async function handleLogin(event) {
        event.preventDefault();

        const loginBtn = document.getElementById('login-btn');
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<div class="loading-spinner"></div>登录中...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok && data.message) {
                showSuccess(data.message + ' 正在跳转...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else {
                showError(data.error || '登录失败');
            }
        } catch (error) {
            console.error('登录请求失败:', error);
            showError('网络错误，请检查连接');
        } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '登录';
        }
    }

    // 处理注册
    async function handleRegister(event) {
        event.preventDefault();

        const registerBtn = document.getElementById('register-btn');
        const username = document.getElementById('register-username').value;
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
            showError('两次输入的密码不一致');
            return;
        }

        registerBtn.disabled = true;
        registerBtn.innerHTML = '<div class="loading-spinner"></div>注册中...';

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok && data.message) {
                showSuccess(data.message + ' 请登录');
                setTimeout(() => {
                    switchTab('login', document.querySelector('.tab-button:first-child'));
                    document.getElementById('login-username').value = username;
                }, 1500);
            } else {
                showError(data.error || '注册失败');
            }
        } catch (error) {
            console.error('注册请求失败:', error);
            showError('网络错误，请检查连接');
        } finally {
            registerBtn.disabled = false;
            registerBtn.innerHTML = '注册';
        }
    }

    // 显示成功消息
    function showSuccess(message) {
        clearAlerts();
        const alertContainer = document.getElementById('alert-container');
        const alert = document.createElement('div');
        alert.className = 'alert success';
        alert.textContent = message;
        alertContainer.appendChild(alert);
    }

    // 显示错误消息
    function showError(message) {
        clearAlerts();
        const alertContainer = document.getElementById('alert-container');
        const alert = document.createElement('div');
        alert.className = 'alert error';
        alert.textContent = message;
        alertContainer.appendChild(alert);
    }

    // 清除所有提示消息
    function clearAlerts() {
        const alertContainer = document.getElementById('alert-container');
        alertContainer.innerHTML = '';
    }

    // 回车键处理
    document.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            const activeForm = document.querySelector('.form:not(.hidden)');
            if (activeForm) {
                const submitBtn = activeForm.querySelector('.submit-button');
                if (submitBtn && !submitBtn.disabled) {
                    submitBtn.click();
                }
            }
        }
    });
</script>
</body>
</html>
