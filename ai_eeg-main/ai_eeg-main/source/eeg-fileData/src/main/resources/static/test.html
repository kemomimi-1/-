<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG Platform - 数据调试控制台</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #2d2d30;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #007acc;
        }

        .section {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #3e3e42;
        }

        .section h3 {
            color: #4ec9b0;
            margin-top: 0;
            border-bottom: 1px solid #3e3e42;
            padding-bottom: 10px;
        }

        .api-test {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .request-panel, .response-panel {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
        }

        .request-panel h4, .response-panel h4 {
            color: #569cd6;
            margin-top: 0;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            margin: 5px 5px 5px 0;
        }

        button:hover {
            background: #1177bb;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            font-size: 12px;
            resize: vertical;
        }

        .json-output {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 10px;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .success { color: #238636; }
        .error { color: #f85149; }
        .warning { color: #d29922; }

        .quick-tests {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-success { background: #238636; }
        .status-error { background: #f85149; }
        .status-pending { background: #d29922; }

        .log-output {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-size: 11px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }

        .timestamp {
            color: #7d8590;
            margin-right: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔧 EEG Platform 调试控制台</h1>
        <p>用于测试API接口和验证数据存储的调试工具</p>
    </div>

    <!-- 系统状态 -->
    <div class="section">
        <h3>🏥 系统状态检查</h3>
        <div class="quick-tests">
            <button onclick="checkAuthStatus()">检查认证状态</button>
            <button onclick="checkConnection()">检查连接状态</button>
            <button onclick="checkInfluxDB()">检查InfluxDB</button>
            <button onclick="testWebSocket()">测试WebSocket</button>
        </div>
        <div id="systemStatus" class="json-output"></div>
    </div>

    <!-- 数据查询测试 -->
    <div class="section">
        <h3>📊 数据查询API测试</h3>

        <div class="api-test">
            <div class="request-panel">
                <h4>请求配置</h4>
                <div style="margin-bottom: 10px;">
                    <label>API端点: </label>
                    <select id="apiEndpoint" onchange="updateRequestTemplate()">
                        <option value="/api/data/summary">数据概要</option>
                        <option value="/api/data/recent">最近数据</option>
                        <option value="/api/data/channels">通道数据</option>
                        <option value="/api/data/bandpower">频段功率</option>
                        <option value="/api/data/stats">数据统计</option>
                        <option value="/api/data/query">自定义查询</option>
                    </select>
                </div>
                <div style="margin-bottom: 10px;">
                    <label>请求参数:</label>
                    <textarea id="requestParams" placeholder='{"measurement": "timeseriesraw", "limit": 10}'></textarea>
                </div>
                <button onclick="sendRequest()">发送请求</button>
                <button onclick="clearResponse()">清空响应</button>
            </div>

            <div class="response-panel">
                <h4>响应结果</h4>
                <div id="apiResponse" class="json-output">等待请求...</div>
            </div>
        </div>
    </div>

    <!-- InfluxDB直接查询 -->
    <div class="section">
        <h3>🗄️ InfluxDB直接查询</h3>

        <div class="api-test">
            <div class="request-panel">
                <h4>SQL查询</h4>
                <div style="margin-bottom: 10px;">
                    <label>查询语句:</label>
                    <textarea id="sqlQuery" placeholder="SELECT * FROM timeseriesraw LIMIT 10">SELECT COUNT(*) as total_records FROM timeseriesraw</textarea>
                </div>
                <div class="quick-tests">
                    <button onclick="setQuery('SELECT * FROM timeseriesraw ORDER BY time DESC LIMIT 10')">最新Raw数据</button>
                    <button onclick="setQuery('SELECT * FROM avg_band_power ORDER BY time DESC LIMIT 10')">最新功率数据</button>
                    <button onclick="setQuery('SELECT user_id, COUNT(*) as count FROM timeseriesraw GROUP BY user_id')">按用户统计</button>
                </div>
                <button onclick="executeSQL()">执行查询</button>
                <button onclick="clearSQL()">清空结果</button>
            </div>

            <div class="response-panel">
                <h4>查询结果</h4>
                <div id="sqlResponse" class="json-output">等待查询...</div>
            </div>
        </div>
    </div>

    <!-- 实时日志 -->
    <div class="section">
        <h3>📝 实时日志</h3>
        <div class="log-output" id="logOutput">
            <div class="log-entry">
                <span class="timestamp">[00:00:00]</span>
                <span class="success">调试控制台已启动</span>
            </div>
        </div>
        <div style="margin-top: 10px;">
            <button onclick="clearLogs()">清空日志</button>
            <button onclick="exportLogs()">导出日志</button>
        </div>
    </div>

    <!-- 数据生成测试 -->
    <div class="section">
        <h3>🧪 数据生成测试</h3>
        <p style="color: #7d8590;">模拟EEG数据传输，用于测试系统功能</p>

        <div class="quick-tests">
            <button onclick="simulateRawData()">模拟Raw数据</button>
            <button onclick="simulateFiltData()">模拟Filtered数据</button>
            <button onclick="simulateBandData()">模拟Band Power数据</button>
            <button onclick="simulateAllData()">模拟全部数据</button>
        </div>

        <div id="simulationStatus" class="json-output" style="height: 100px;">
            点击按钮开始数据模拟测试...
        </div>
    </div>
</div>

<script>
    let logCounter = 0;

    function log(message, type = 'info') {
        const logOutput = document.getElementById('logOutput');
        const timestamp = new Date().toLocaleTimeString();
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';

        let className = '';
        switch(type) {
            case 'success': className = 'success'; break;
            case 'error': className = 'error'; break;
            case 'warning': className = 'warning'; break;
            default: className = '';
        }

        logEntry.innerHTML = `
                <span class="timestamp">[${timestamp}]</span>
                <span class="${className}">${message}</span>
            `;

        logOutput.appendChild(logEntry);
        logOutput.scrollTop = logOutput.scrollHeight;

        logCounter++;
        if (logCounter > 100) {
            logOutput.removeChild(logOutput.firstChild);
            logCounter--;
        }
    }

    function updateRequestTemplate() {
        const endpoint = document.getElementById('apiEndpoint').value;
        const paramsInput = document.getElementById('requestParams');

        const templates = {
            '/api/data/summary': '{}',
            '/api/data/recent': '{"measurement": "timeseriesraw", "limit": 10}',
            '/api/data/channels': '{"channel": 1, "measurement": "timeseriesraw", "hours": 1}',
            '/api/data/bandpower': '{"band": "alpha", "hours": 1}',
            '/api/data/stats': '{}',
            '/api/data/query': '{"query": "SELECT * FROM timeseriesraw LIMIT 5"}'
        };

        paramsInput.value = templates[endpoint] || '{}';
    }

    async function sendRequest() {
        const endpoint = document.getElementById('apiEndpoint').value;
        const params = document.getElementById('requestParams').value;
        const responseDiv = document.getElementById('apiResponse');

        try {
            log(`发送请求: ${endpoint}`, 'info');

            let url = endpoint;
            let options = { method: 'GET' };

            if (endpoint === '/api/data/query') {
                options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: params
                };
            } else if (params && params !== '{}') {
                const paramObj = JSON.parse(params);
                const urlParams = new URLSearchParams(paramObj);
                url += '?' + urlParams.toString();
            }

            const response = await fetch(url, options);
            const data = await response.json();

            responseDiv.innerHTML = JSON.stringify(data, null, 2);
            responseDiv.className = 'json-output ' + (response.ok ? 'success' : 'error');

            log(`请求${response.ok ? '成功' : '失败'}: ${response.status}`, response.ok ? 'success' : 'error');

        } catch (error) {
            responseDiv.innerHTML = `错误: ${error.message}`;
            responseDiv.className = 'json-output error';
            log(`请求异常: ${error.message}`, 'error');
        }
    }

    async function executeSQL() {
        const query = document.getElementById('sqlQuery').value;
        const responseDiv = document.getElementById('sqlResponse');

        if (!query.trim()) {
            log('SQL查询不能为空', 'warning');
            return;
        }

        try {
            log(`执行SQL: ${query.substring(0, 50)}...`, 'info');

            const response = await fetch('/api/data/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });

            const data = await response.json();

            responseDiv.innerHTML = JSON.stringify(data, null, 2);
            responseDiv.className = 'json-output ' + (response.ok ? 'success' : 'error');

            log(`SQL执行${response.ok ? '成功' : '失败'}`, response.ok ? 'success' : 'error');

        } catch (error) {
            responseDiv.innerHTML = `错误: ${error.message}`;
            responseDiv.className = 'json-output error';
            log(`SQL执行异常: ${error.message}`, 'error');
        }
    }

    async function checkAuthStatus() {
        try {
            const response = await fetch('/api/auth/status');
            const data = await response.json();

            const statusDiv = document.getElementById('systemStatus');
            statusDiv.innerHTML = `认证状态: ${JSON.stringify(data, null, 2)}`;

            if (data.authenticated) {
                log(`用户已登录: ${data.username} (ID: ${data.userId})`, 'success');
            } else {
                log('用户未登录', 'warning');
            }

        } catch (error) {
            log(`认证状态检查失败: ${error.message}`, 'error');
        }
    }

    async function checkConnection() {
        try {
            const response = await fetch('/api/connection/status');
            const data = await response.json();

            log(`连接状态: ${data.connectionStatus ? '已连接' : '未连接'}`,
                data.connectionStatus ? 'success' : 'warning');

        } catch (error) {
            log(`连接状态检查失败: ${error.message}`, 'error');
        }
    }

    async function checkInfluxDB() {
        try {
            const response = await fetch('/api/data/stats');
            const data = await response.json();

            if (response.ok) {
                log('InfluxDB连接正常', 'success');
            } else {
                log(`InfluxDB连接失败: ${data.error}`, 'error');
            }

        } catch (error) {
            log(`InfluxDB检查失败: ${error.message}`, 'error');
        }
    }

    function testWebSocket() {
        try {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/eeg?userId=test`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log('WebSocket连接测试成功', 'success');
                ws.close();
            };

            ws.onerror = (error) => {
                log('WebSocket连接测试失败', 'error');
            };

            setTimeout(() => {
                if (ws.readyState === WebSocket.CONNECTING) {
                    ws.close();
                    log('WebSocket连接超时', 'warning');
                }
            }, 5000);

        } catch (error) {
            log(`WebSocket测试异常: ${error.message}`, 'error');
        }
    }

    function setQuery(query) {
        document.getElementById('sqlQuery').value = query;
    }

    function clearResponse() {
        document.getElementById('apiResponse').innerHTML = '等待请求...';
        document.getElementById('apiResponse').className = 'json-output';
    }

    function clearSQL() {
        document.getElementById('sqlResponse').innerHTML = '等待查询...';
        document.getElementById('sqlResponse').className = 'json-output';
    }

    function clearLogs() {
        document.getElementById('logOutput').innerHTML = '';
        logCounter = 0;
        log('日志已清空', 'info');
    }

    function exportLogs() {
        const logs = document.getElementById('logOutput').innerText;
        const blob = new Blob([logs], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `eeg_debug_log_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        log('日志已导出', 'success');
    }

    // 数据模拟功能
    async function simulateRawData() {
        const simulationDiv = document.getElementById('simulationStatus');
        simulationDiv.innerHTML = '正在模拟Raw数据传输...\n';
        log('开始模拟Raw数据', 'info');

        // 这里可以添加实际的数据模拟逻辑
        setTimeout(() => {
            simulationDiv.innerHTML += '模拟Raw数据传输完成\n';
            log('Raw数据模拟完成', 'success');
        }, 2000);
    }

    async function simulateFiltData() {
        const simulationDiv = document.getElementById('simulationStatus');
        simulationDiv.innerHTML = '正在模拟Filtered数据传输...\n';
        log('开始模拟Filtered数据', 'info');

        setTimeout(() => {
            simulationDiv.innerHTML += '模拟Filtered数据传输完成\n';
            log('Filtered数据模拟完成', 'success');
        }, 2000);
    }

    async function simulateBandData() {
        const simulationDiv = document.getElementById('simulationStatus');
        simulationDiv.innerHTML = '正在模拟Band Power数据传输...\n';
        log('开始模拟Band Power数据', 'info');

        setTimeout(() => {
            simulationDiv.innerHTML += '模拟Band Power数据传输完成\n';
            log('Band Power数据模拟完成', 'success');
        }, 2000);
    }

    async function simulateAllData() {
        log('开始完整数据模拟测试', 'info');
        await simulateRawData();
        await new Promise(resolve => setTimeout(resolve, 1000));
        await simulateFiltData();
        await new Promise(resolve => setTimeout(resolve, 1000));
        await simulateBandData();
        log('完整数据模拟测试完成', 'success');
    }

    // 页面加载时的初始化
    window.onload = function() {
        log('调试控制台初始化完成', 'success');
        updateRequestTemplate();

        // 自动检查系统状态
        setTimeout(() => {
            checkAuthStatus();
        }, 1000);
    };
</script>
</body>
</html>
